<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 الثعبان الذهبي | Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a1f1a 0%, #0c2b24 100%);
            font-family: 'Segoe UI', 'Tajawal', 'Poppins', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        .game-panel {
            background: #0d2c24;
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: inset 0 0 8px #2f7a5e, 0 10px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.2rem;
            box-shadow: 0 0 0 3px #ffd966, 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            background-color: #1a3a32;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #071f1bcc;
            border-radius: 80px;
            color: #f7ecc7;
            font-weight: bold;
        }

        .score-box, .high-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .score-box span, .high-box span {
            color: #ffcf4a;
            font-size: 1.5rem;
            margin-left: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #2f6b5c;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1rem;
            color: #faf0cf;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #15423a;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #15423a;
        }

        .direction-pad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .dir-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .dir-btn {
            background: #2e5a4e;
            font-size: 1.8rem;
            padding: 10px 25px;
            box-shadow: 0 5px 0 #1a3e35;
            border-radius: 50px;
            min-width: 80px;
        }
        .dir-btn:active {
            transform: translateY(3px);
        }

        .status {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            color: #ffdd99;
            background: #00000055;
            padding: 6px;
            border-radius: 60px;
            font-size: 0.9rem;
        }

        @media (max-width: 650px) {
            .dir-btn {
                font-size: 1.3rem;
                padding: 8px 18px;
                min-width: 65px;
            }
            .score-box, .high-box {
                font-size: 0.9rem;
                padding: 4px 12px;
            }
            canvas {
                width: 95%;
                height: auto;
            }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 15px;
            color: #9bc0b5;
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <div class="game-panel">
            <div class="info-bar">
                <div class="score-box">🍎 النقاط: <span id="scoreValue">0</span></div>
                <div class="high-box">🏆 أعلى نتيجة: <span id="highScoreValue">0</span></div>
                <button id="restartButton">🔄 إعادة التشغيل</button>
                <button id="pauseButton">⏸️ إيقاف</button>
            </div>

            <canvas id="snakeCanvas" width="500" height="500"></canvas>

            <div class="controls">
                <div class="direction-pad">
                    <div class="dir-row">
                        <button class="dir-btn" data-dir="UP">▲ أعلى</button>
                    </div>
                    <div class="dir-row">
                        <button class="dir-btn" data-dir="LEFT">◀ يسار</button>
                        <button class="dir-btn" data-dir="DOWN">▼ أسفل</button>
                        <button class="dir-btn" data-dir="RIGHT">يمين ▶</button>
                    </div>
                </div>
            </div>
            <div class="status" id="gameStatusText">▶ استخدم الأسهم أو الأزرار للعب</div>
        </div>
        <footer>🐍 تحكم سلس | تزداد السرعة كل 5 نقاط | تجنب الجدران والذات</footer>
    </div>
</div>

<script>
    (function(){
        // ------------------- إعدادات اللعبة -------------------
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const highScoreSpan = document.getElementById('highScoreValue');
        const restartBtn = document.getElementById('restartButton');
        const pauseBtn = document.getElementById('pauseButton');
        const statusDiv = document.getElementById('gameStatusText');

        // أبعاد الشبكة
        const GRID_SIZE = 20;      // 20x20
        const CELL_SIZE = canvas.width / GRID_SIZE; // 25px

        // متغيرات الثعبان
        let snake = [];     // مصفوفة من {x, y}
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';    // الاتجاه الحالي
        let nextDirection = 'RIGHT';
        let score = 0;
        let highScore = 0;
        let gameLoopInterval = null;
        let isGameRunning = true;    // هل اللعبة نشطة (غير منتهية)
        let isPaused = false;
        let baseSpeedMs = 150;       // السرعة الأساسية (مللي ثانية)
        let currentSpeedMs = baseSpeedMs;

        // تحميل أفضل نتيجة من التخزين المحلي
        function loadHighScore() {
            const saved = localStorage.getItem('snakeHighScore');
            if(saved && !isNaN(parseInt(saved))) {
                highScore = parseInt(saved);
                highScoreSpan.innerText = highScore;
            } else {
                highScore = 0;
                highScoreSpan.innerText = '0';
            }
        }

        function saveHighScore() {
            if(score > highScore) {
                highScore = score;
                highScoreSpan.innerText = highScore;
                localStorage.setItem('snakeHighScore', highScore);
            }
        }

        // تحديث عرض النتيجة
        function updateScoreUI() {
            scoreSpan.innerText = score;
            if(score > highScore) {
                highScoreSpan.innerText = score;
            }
        }

        // إنشاء ثعبان جديد في البداية
        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 },
                { x: 7, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
        }

        // توليد طعام جديد في مكان عشوائي غير متداخل مع الثعبان
        function generateRandomFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if(snake.length >= totalCells) {
                // فوز كامل! إنهاء اللعبة بطريقة خاصة
                gameOver(true);
                return false;
            }
            // خوارزمية سريعة: تجربة عشوائية حتى نجد مكان فارغ (في الغالب سريع)
            let freeCells = [];
            // إذا كان الثعبان كبيراً جداً نستخدم البحث الشامل, لكن نستخدم حلاً عملياً
            if(snake.length > totalCells * 0.8) {
                // بحث شامل للفارغات
                for(let i=0; i<GRID_SIZE; i++) {
                    for(let j=0; j<GRID_SIZE; j++) {
                        if(!snake.some(segment => segment.x === i && segment.y === j)) {
                            freeCells.push({x: i, y: j});
                        }
                    }
                }
                if(freeCells.length === 0) {
                    gameOver(true);
                    return false;
                }
                const rand = Math.floor(Math.random() * freeCells.length);
                food = freeCells[rand];
                return true;
            } else {
                // بحث عشوائي محدود
                let maxAttempts = 2000;
                while(maxAttempts-- > 0) {
                    const randX = Math.floor(Math.random() * GRID_SIZE);
                    const randY = Math.floor(Math.random() * GRID_SIZE);
                    if(!snake.some(segment => segment.x === randX && segment.y === randY)) {
                        food = { x: randX, y: randY };
                        return true;
                    }
                }
                // لو فشلت المحاولات العشوائية, نستخدم البحث الشامل
                for(let i=0; i<GRID_SIZE; i++) {
                    for(let j=0; j<GRID_SIZE; j++) {
                        if(!snake.some(seg => seg.x === i && seg.y === j)) {
                            food = { x: i, y: j };
                            return true;
                        }
                    }
                }
                gameOver(true);
                return false;
            }
        }

        // ضبط سرعة اللعبة بناءً على النقاط (كل 5 نقاط تزيد السرعة بنسبة)
        function updateSpeedBasedOnScore() {
            let newSpeed = baseSpeedMs - Math.floor(score / 5) * 6;
            if(newSpeed < 70) newSpeed = 70;
            if(newSpeed !== currentSpeedMs) {
                currentSpeedMs = newSpeed;
                // إعادة تعيين المؤقت بالسرعة الجديدة إذا كانت اللعبة نشطة وغير متوقفة
                if(gameLoopInterval && isGameRunning && !isPaused) {
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = setInterval(gameTick, currentSpeedMs);
                }
            }
        }

        // حركة الثعبان (تحديث حالة اللعبة)
        function moveSnake() {
            // تطبيق الاتجاه الجديد
            direction = nextDirection;

            // حساب الرأس الجديد
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
                default: break;
            }

            // التحقق من أكل الطعام
            const willEat = (newHead.x === food.x && newHead.y === food.y);

            // إضافة الرأس الجديد
            snake.unshift(newHead);
            if(!willEat) {
                snake.pop();
            } else {
                // زيادة النقاط
                score++;
                updateScoreUI();
                saveHighScore();
                updateSpeedBasedOnScore();
                // توليد طعام جديد
                const success = generateRandomFood();
                if(!success) return; // game over handled inside
            }

            // التحقق من التصادم (الجدران أو الذات)
            // الحدود
            if(newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver(false);
                return;
            }
            // التصادم مع الذات: نتحقق إذا كان الرأس موجود في باقي الجسم (باستثناء أول عنصر بعد الإضافة)
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    gameOver(false);
                    return;
                }
            }
        }

        // إنهاء اللعبة (مع عرض رسالة)
        function gameOver(fullWin = false) {
            if(!isGameRunning) return;
            isGameRunning = false;
            if(gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
            if(fullWin && snake.length === GRID_SIZE * GRID_SIZE) {
                statusDiv.innerHTML = "🏆 إنجاز أسطوري! ملأت اللوحة بالكامل! اضغط إعادة التشغيل 🏆";
            } else {
                statusDiv.innerHTML = "💀 انتهت اللعبة! اضغط 'إعادة التشغيل' لبداية جديدة 💀";
            }
            draw(); // رسم نهائي مع رسالة
        }

        // إعادة ضبط كامل اللعبة
        function restartGame() {
            // إيقاف أي مؤقت قديم
            if(gameLoopInterval) {
                clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
            // إعادة تعيين المتغيرات
            initSnake();
            score = 0;
            isGameRunning = true;
            isPaused = false;
            pauseBtn.innerText = "⏸️ إيقاف";
            currentSpeedMs = baseSpeedMs;
            updateScoreUI();
            saveHighScore();   // يحافظ على أعلى نتيجة سابقة ولا يخسرها
            // توليد طعام آمن
            // إزالة أي طعام متداخل
            food = { x: 5, y: 5 };
            // نتأكد أن الطعام ليس في الثعبان
            while(snake.some(seg => seg.x === food.x && seg.y === food.y)) {
                food = { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };
            }
            // تأكيد صحة الطعام
            if(!snake.some(seg => seg.x === food.x && seg.y === food.y)) {
                // جيد
            } else {
                generateRandomFood();
            }
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            statusDiv.innerHTML = "▶ اللعبة مستمرة | استخدم الأسهم أو الأزرار";
            // بدء المؤقت
            gameLoopInterval = setInterval(gameTick, currentSpeedMs);
            draw();
        }

        // دورة اللعبة (تحديث المنطق وإعادة الرسم)
        function gameTick() {
            if(!isGameRunning || isPaused) return;
            moveSnake();      // تحتوي داخلياً على gameOver إذا حصل تصادم
            draw();           // إعادة رسم اللوحة بعد الحركة
            if(!isGameRunning) {
                // إذا انتهت اللعبة نوقف التحديثات
                if(gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = null;
            }
        }

        // ------------------- رسم اللوحة (سلس وحديث) -------------------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // رسم شبكة خفيفة
            ctx.strokeStyle = '#2e6b5c';
            ctx.lineWidth = 0.8;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // رسم الطعام (تأثير متوهج)
            ctx.shadowBlur = 0;
            ctx.shadowColor = "transparent";
            const grad = ctx.createRadialGradient(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, 5, food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, 15);
            grad.addColorStop(0, '#ff5e3a');
            grad.addColorStop(1, '#d93c1a');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fff3b0';
            ctx.beginPath();
            ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 3, 0, Math.PI*2);
            ctx.fill();

            // رسم الثعبان (جسم انسيابي)
            for(let i = 0; i < snake.length; i++) {
                const seg = snake[i];
                const x = seg.x * CELL_SIZE;
                const y = seg.y * CELL_SIZE;
                const isHead = (i === 0);
                const radius = CELL_SIZE * 0.35;
                // تدرج حسب الجزء
                let fillColor;
                if(isHead) {
                    fillColor = '#f7c56e';
                } else {
                    const intensity = 0.4 + (i / snake.length) * 0.4;
                    fillColor = `rgb(70, 180, 120)`;
                }
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.fillStyle = isHead ? '#ffcf70' : '#46b47a';
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, 8);
                ctx.fill();
                // عيون الثعبان للرأس
                if(isHead) {
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 8, y + 8, 3, 0, Math.PI*2);
                    ctx.arc(x + 8, y + 8, 3, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#0a2b22";
                    ctx.beginPath();
                    ctx.arc(x + CELL_SIZE - 7, y + 7, 1.5, 0, Math.PI*2);
                    ctx.arc(x + 9, y + 7, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;

            // إذا كانت اللعبة متوقفة (paused) نضيف طبقة
            if(isPaused && isGameRunning) {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#0a1f1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = "bold 24px 'Segoe UI'";
                ctx.fillStyle = "#f7e05e";
                ctx.shadowBlur = 0;
                ctx.fillText("⏸ متوقف", canvas.width/2-70, canvas.height/2);
            } else if(!isGameRunning) {
                ctx.globalAlpha = 0.75;
                ctx.fillStyle = '#000000aa';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1;
                ctx.font = "bold 22px 'Segoe UI'";
                ctx.fillStyle = "#ffbe76";
                ctx.fillText("GAME OVER", canvas.width/2-70, canvas.height/2);
                ctx.font = "14px monospace";
                ctx.fillStyle = "#aaddcc";
                ctx.fillText("اضغط إعادة التشغيل", canvas.width/2-85, canvas.height/2+40);
            }
        }

        // مساعد لرسم مستدير الزوايا
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // تغيير الاتجاه مع منع الانعكاس المباشر
        function changeDirection(newDir) {
            if(!isGameRunning || isPaused) return;
            const opposite = {
                'UP': 'DOWN',
                'DOWN': 'UP',
                'LEFT': 'RIGHT',
                'RIGHT': 'LEFT'
            };
            if(opposite[newDir] !== direction) {
                nextDirection = newDir;
            }
        }

        // أحداث لوحة المفاتيح
        function handleKeydown(e) {
            const key = e.key;
            e.preventDefault();
            if(key === 'ArrowUp') changeDirection('UP');
            else if(key === 'ArrowDown') changeDirection('DOWN');
            else if(key === 'ArrowLeft') changeDirection('LEFT');
            else if(key === 'ArrowRight') changeDirection('RIGHT');
            else if(key === ' ' || key === 'Space') {
                e.preventDefault();
                togglePause();
            }
        }

        // تبديل الإيقاف المؤقت
        function togglePause() {
            if(!isGameRunning) return;
            isPaused = !isPaused;
            if(isPaused) {
                if(gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = null;
                pauseBtn.innerText = "▶ استئناف";
                statusDiv.innerHTML = "⏸ اللعبة متوقفة مؤقتاً | اضغط استئناف";
            } else {
                if(gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = setInterval(gameTick, currentSpeedMs);
                pauseBtn.innerText = "⏸️ إيقاف";
                statusDiv.innerHTML = "▶ اللعبة مستمرة | استخدم الأسهم";
                draw();
                // نرسم فوراً لإزالة طبقة التوقف
            }
            draw();
        }

        // إعداد الأزرار الاتجاهية
        function setupDirectionButtons() {
            const dirBtns = document.querySelectorAll('.dir-btn');
            dirBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const dir = btn.getAttribute('data-dir');
                    if(dir === 'UP') changeDirection('UP');
                    else if(dir === 'DOWN') changeDirection('DOWN');
                    else if(dir === 'LEFT') changeDirection('LEFT');
                    else if(dir === 'RIGHT') changeDirection('RIGHT');
                });
            });
        }

        // منع التمرير بالأسهم على الصفحة
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
            }
        });

        // تهيئة اللعبة وتشغيلها
        function initGame() {
            loadHighScore();
            initSnake();
            score = 0;
            updateScoreUI();
            isGameRunning = true;
            isPaused = false;
            currentSpeedMs = baseSpeedMs;
            // توليد طعام مناسب
            generateRandomFood();
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameTick, currentSpeedMs);
            draw();
            // ربط الأحداث
            document.addEventListener('keydown', handleKeydown);
            restartBtn.addEventListener('click', () => { restartGame(); });
            pauseBtn.addEventListener('click', togglePause);
            setupDirectionButtons();
        }

        initGame();
    })();
</script>
</body>
</html>
